async function postSubmission(payload) {
  // RLS policy on `submissions` allows anon INSERT only — no SELECT, so we
  // can't ask Supabase to return the row. Caller generates the UUID
  // client-side and includes it in the payload, so we already know the id.
  const res = await fetch(`${SUPABASE_URL}/rest/v1/submissions`, {
    method: "POST",
    headers: {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "return=minimal",
    },
    body: JSON.stringify(payload),
  });
  if (!res.ok) {
    const text = await res.text().catch(() => "");
    throw new Error(`Supabase ${res.status}: ${text || res.statusText}`);
  }
  return true;
}

// Calls the stack-review edge function which generates a Claude-written
// narrative review using the Tech on Toast guardrails. Best-effort — the
// numeric report renders regardless of whether this succeeds.
async function postStackReview(submissionId) {
  const res = await fetch(`${SUPABASE_URL}/functions/v1/stack-review`, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ submission_id: submissionId }),
  });
  if (!res.ok) {
    const text = await res.text().catch(() => "");
    throw new Error(`stack-review ${res.status}: ${text || res.statusText}`);
  }
  const data = await res.json().catch(() => ({}));
  return typeof data.review === "string" ? data.review : "";
}

// ---------- ROI MODEL ----------
// Per-site annual savings & weekly hours saved when an operator adopts a tool in this category.
// Numbers are directional industry benchmarks for a typical UK site doing ~£800k–£1.2m revenue.
// Conservative per-site benchmarks. Intentionally at the low end of what operators
// typically claim. Gap savings use the full figure; switching/renegotiation claws

  pos:       { hrs: 1, gbp: 800,   why: "Cleaner EPOS integrations cut 1–2 hrs/wk of manual reconciliation and data re-entry." },
  payments:  { hrs: 1, gbp: 2400,  why: "Modern acquirers typically cut card fees 0.2–0.3% (~£2–3k/site/yr on £1m revenue). TRONC saves ~13.8% NI on distributed tips." },
  workforce: { hrs: 4, gbp: 7500,  why: "Smart rotas trim 1.5–2.5% off wage cost at most operators. Payroll in hours not days." },
  inventory: { hrs: 4, gbp: 9500,  why: "1–2 point GP improvement from recipe costing + variance alerts. Weekly stocktake drops from a day to an hour." },
  loyalty:   { hrs: 1, gbp: 4200,  why: "Known guests visit modestly more than anonymous ones. Email/SMS to a real database beats paid ads for ROI." },
  learning:  { hrs: 1, gbp: 1600,  why: "Structured onboarding cuts time-to-competency meaningfully. Tracked compliance = no mystery gaps at audit time." },
};

function siteMultiplier(sites) {
  return { "1": 1, "2-5": 3, "6-20": 10, "20+": 25 }[sites] || 1;
}
function fmtGBP(n) {
  if (n >= 1000000) return "£" + (n / 1000000).toFixed(1) + "m";
  if (n >= 1000) return "£" + Math.round(n / 100) / 10 + "k";
  return "£" + Math.round(n);
}

// ---------- REPORT ----------
function buildReport({ venue, stack }) {
  const segment = segmentFor(venue.type, venue.sites);
  const bench = BENCHMARKS[segment];
  const mult = siteMultiplier(venue.sites);

  const covered = CATEGORIES.filter(c => {
    const s = stack[c.id] || {};
    return (s.tools || []).length > 0 || (s.other && s.other.trim());
  });
  const coverage = Math.round((covered.length / CATEGORIES.length) * 100);

  // Gaps: categories with no tool. Full ROI available if they close the gap.
  const gaps = CATEGORIES
    .filter(c => {
      const s = stack[c.id] || {};
      return (s.tools || []).length === 0 && !(s.other && s.other.trim());
    })
    .map(c => {
      const peerPct = bench.adoption[c.id] || 0;
      const roi = ROI[c.id] || { hrs: 0, gbp: 0, why: "" };
      return {
        kind: "gap",
        category: c,
        peerPct,
        hrsPerWeek: roi.hrs * mult,
        gbpPerYear: roi.gbp * mult,
        why: roi.why,
      };
    })
    .filter(g => g.peerPct >= 35)
    .sort((a, b) => b.gbpPerYear - a.gbpPerYear);

  // Switches: categories where they DO have a tool. A portion of ROI is still recoverable
  // via renegotiating contracts, consolidating duplicates, or switching to a modern vendor.
  const SWITCH_FACTOR = 0.10; // most value is already captured if you have a tool, ~10% recoverable via renegotiation/switching
  const switches = CATEGORIES
    .filter(c => {
      const s = stack[c.id] || {};
      return (s.tools || []).length > 0 || (s.other && s.other.trim());
    })
    .map(c => {
      const s = stack[c.id] || {};
      const tools = [...(s.tools || []), ...(s.other ? [s.other.trim()] : [])];
      const roi = ROI[c.id] || { hrs: 0, gbp: 0, why: "" };
      return {
        kind: "switch",
        category: c,
        tools,
        hrsPerWeek: Math.round(roi.hrs * SWITCH_FACTOR) * mult,
        gbpPerYear: Math.round(roi.gbp * SWITCH_FACTOR) * mult,
        why: c.id === "payments"
          ? "Card-fee benchmarking alone typically finds 0.1–0.3% savings on acquirer renegotiation."
          : c.id === "pos"
          ? "Most operators overpay on legacy POS contracts. A switch or renegotiation cycle trims 15–25%."
          : c.id === "people"
          ? "Modern rota optimisers consistently shave 1–2% off wage bill vs. older tools."
          : c.id === "stock"
          ? "Auditing whether your stock tool is actually surfacing variance often uncovers 1–2 points of GP."
          : "Benchmarking contract terms, consolidating overlap, or switching to best-in-class typically unlocks 20–30% of the category ROI.",
      };
    })
    .filter(s => s.gbpPerYear > 0)
    .sort((a, b) => b.gbpPerYear - a.gbpPerYear);

  const gapGbp = gaps.reduce((t, g) => t + g.gbpPerYear, 0);
  const gapHrs = gaps.reduce((t, g) => t + g.hrsPerWeek, 0);
  const switchGbp = switches.reduce((t, s) => t + s.gbpPerYear, 0);
  const switchHrs = switches.reduce((t, s) => t + s.hrsPerWeek, 0);
  const totalGbp = gapGbp + switchGbp;
  const totalHrs = gapHrs + switchHrs;

  // ---- Score ----
  // Each category is weighted by peer adoption (categories everyone runs matter more).
  // Per category: 50% for any coverage, +30% for using a top-adopted peer tool,
  // +10% for having 2+ tools (depth/integrations). +10 bonus if all 6 covered.
  // A single mediocre tool per category lands ~60. Top-peer everywhere ~90. Perfect = full
  // coverage + top-peer + multi-tool depth.
  let earned = 0;
  let available = 0;
  let coveredCats = 0;
  for (const c of CATEGORIES) {
    const s = stack[c.id] || {};
    const tools = s.tools || [];
    const hasOther = !!(s.other || "").trim();
    const peerPct = bench.adoption[c.id] || 0;
    const topPeerNames = (bench.topTools[c.id] || []).map(p => p[0]);

    const weight = Math.max(5, Math.round(peerPct / 4));
    available += weight;

    const hasCoverage = tools.length > 0 || hasOther;
    if (!hasCoverage) continue;
    coveredCats++;

    let pts = weight * 0.5;
    if (tools.some(t => topPeerNames.includes(t))) pts += weight * 0.3;
    if (tools.length >= 2) pts += weight * 0.1;
    earned += pts;
  }
  let rawScore = available > 0 ? (earned / available) * 100 : 0;
  if (coveredCats === CATEGORIES.length) rawScore += 10; // full-stack bonus
  const matchScore = Math.max(0, Math.min(100, Math.round(rawScore)));

  return { segment, bench, coverage, gaps, switches, matchScore, covered, totalGbp, totalHrs, gapGbp, gapHrs, switchGbp, switchHrs };
}

function ScoreRing({ score }) {
  const r = 54, c = 2 * Math.PI * r;
  const pct = Math.max(0, Math.min(100, score));
  const off = c - (pct / 100) * c;
  return h("div", { className: "relative w-32 h-32" },
    h("svg", { viewBox: "0 0 120 120", className: "w-full h-full -rotate-90" },
      h("circle", { cx: 60, cy: 60, r, stroke: "#254211", strokeWidth: 10, fill: "none" }),
      h("circle", {
        cx: 60, cy: 60, r, stroke: "#82e914", strokeWidth: 10, fill: "none",
        strokeLinecap: "round",
        strokeDasharray: c, strokeDashoffset: off,
        style: { transition: "stroke-dashoffset 900ms ease-out" },
      })
    ),
    h("div", { className: "absolute inset-0 flex flex-col items-center justify-center" },
      h("div", { className: "font-display text-3xl font-bold" }, score),
      h("div", { className: "text-xs text-muted" }, "/ 100")
    )
  );
}

// Tiny markdown renderer for the AI-written review. Handles **bold**, h2/h3
// headings, and dash/numbered bullets — the subset our prompt asks the model
// to produce. Anything more exotic falls through as a paragraph.
function renderInlineMd(text) {
  const out = [];
  const re = /\*\*([^*]+)\*\*/g;
  let last = 0;
  let m;
  let key = 0;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) out.push(text.slice(last, m.index));
    out.push(h("strong", { key: key++, className: "text-brand" }, m[1]));
    last = m.index + m[0].length;
  }
  if (last < text.length) out.push(text.slice(last));
  return out;
}

function renderMarkdown(text) {
  if (!text) return null;
  // Normalize: ensure every heading line is followed by a blank line so it
  // becomes its own block instead of absorbing the content below it. Without
  // this, "## Heading\nContent" renders as just the heading and silently
  // drops Content.
  const normalized = text.trim().replace(/^(#{1,6} .+)\n(?!\n|$)/gm, "$1\n\n");
  const blocks = normalized.split(/\n{2,}/);
  return blocks.map((block, i) => {
    const lines = block.split("\n");
    const first = lines[0] || "";
    if (first.startsWith("### ")) {
      return h("h4", { key: i, className: "font-display text-base font-bold mt-4 mb-2" }, renderInlineMd(first.slice(4)));
    }
    if (first.startsWith("## ")) {
      return h("h3", { key: i, className: "font-display text-lg font-bold mt-5 mb-2 text-brand" }, renderInlineMd(first.slice(3)));
    }
    if (first.startsWith("# ")) {
      return h("h2", { key: i, className: "font-display text-xl font-bold mt-5 mb-3 text-brand" }, renderInlineMd(first.slice(2)));
    }
    if (lines.every(l => /^\s*[-*]\s+/.test(l))) {
      return h("ul", { key: i, className: "list-disc list-outside ml-5 space-y-1.5 mb-3 text-cream/90" },
        lines.map((l, j) => h("li", { key: j }, renderInlineMd(l.replace(/^\s*[-*]\s+/, ""))))
      );
    }
    if (lines.every(l => /^\s*\d+\.\s+/.test(l))) {
      return h("ol", { key: i, className: "list-decimal list-outside ml-5 space-y-1.5 mb-3 text-cream/90" },
        lines.map((l, j) => h("li", { key: j }, renderInlineMd(l.replace(/^\s*\d+\.\s+/, ""))))
      );
    }
    return h("p", { key: i, className: "mb-3 text-cream/90 leading-relaxed" }, renderInlineMd(block));
  });
}

    const date = new Date().toISOString().slice(0, 10);

async function postDeepReview(payload, anonKey, baseUrl) {
  const res = await fetch(`${baseUrl}/rest/v1/deep_reviews`, {
    method: "POST",
    headers: {
      "apikey": anonKey,
      "Authorization": `Bearer ${anonKey}`,
      "Content-Type": "application/json",
      "Prefer": "return=minimal",
    },
    body: JSON.stringify(payload),
  });
  if (!res.ok) {
    const text = await res.text().catch(() => "");
    throw new Error(`Supabase ${res.status}: ${text || res.statusText}`);
  }
  return true;
}

// ---------- APP ----------
function App() {
  const [step, setStep] = useState(0);
  const [venue, setVenue] = useState({ type: "", sites: "" });
  const [stack, setStack] = useState({}); // { [catId]: { tools: [], other: "", none: bool } }
  const [lead, setLead] = useState({ firstName: "", lastName: "", email: "", phone: "", company: "", location: "", consent: false, hp: "" });

  // Stage 2 state: null (not started) | 0..5 (question index) | "submitting" | "thanks"
  const [deepStep, setDeepStep] = useState(null);
  const [deepAnswers, setDeepAnswers] = useState({ pain_category: "", renewal_window: "", tech_spend_band: "", decision_maker: "", growth_goal: "", growth_goal_other: "", open_to_intro: "" });
  const [deepSubmit, setDeepSubmit] = useState({ status: "idle", error: "" });

  const totalCategorySteps = CATEGORIES.length;
  const VENUE_STEP = 1;
  const FIRST_CAT_STEP = 2;
  const LAST_CAT_STEP = FIRST_CAT_STEP + totalCategorySteps - 1;
  const GATE_STEP = LAST_CAT_STEP + 1;
  const REPORT_STEP = GATE_STEP + 1;

  const progressTotal = 1 + totalCategorySteps + 1;
  const progressStep = step === 0 ? 0
    : step === VENUE_STEP ? 1
    : step >= FIRST_CAT_STEP && step <= LAST_CAT_STEP ? 1 + (step - FIRST_CAT_STEP + 1)
    : step === GATE_STEP ? progressTotal
    : progressTotal;

  const currentCategory = step >= FIRST_CAT_STEP && step <= LAST_CAT_STEP
    ? CATEGORIES[step - FIRST_CAT_STEP] : null;

  function ensureCat(catId) {
    setStack(prev => prev[catId] ? prev : { ...prev, [catId]: { tools: [], other: "", none: false, nps: {} } });
  }
  function toggleTool(catId, tool) {
    setStack(prev => {
      const cur = prev[catId] || { tools: [], other: "", none: false, nps: {} };
      const exists = cur.tools.includes(tool);
      const nextNps = { ...(cur.nps || {}) };
      if (exists) delete nextNps[tool];
      return {
        ...prev,
        [catId]: {
          ...cur,
          none: false,
          tools: exists ? cur.tools.filter(t => t !== tool) : [...cur.tools, tool],
          nps: nextNps,
        },
      };
    });
  }
  function toggleNone(catId) {
    setStack(prev => {
      const cur = prev[catId] || { tools: [], other: "", none: false, nps: {} };
      const turningOn = !cur.none;
      return { ...prev, [catId]: { tools: turningOn ? [] : cur.tools, other: turningOn ? "" : cur.other, none: turningOn, nps: turningOn ? {} : (cur.nps || {}) } };
    });
  }
  function setOther(catId, text) {
    setStack(prev => {
      const cur = prev[catId] || { tools: [], other: "", none: false, nps: {} };
      // Clear any stale __other__ nps keys when the text changes
      const nextNps = Object.fromEntries(
        Object.entries(cur.nps || {}).filter(([k]) => !k.startsWith("__other__:"))
      );
      const trimmed = text.trim();
      const preserved = trimmed && cur.nps && cur.nps[`__other__:${trimmed}`] != null
        ? { [`__other__:${trimmed}`]: cur.nps[`__other__:${trimmed}`] }
        : {};
      return { ...prev, [catId]: { ...cur, other: text, none: text ? false : cur.none, nps: { ...nextNps, ...preserved } } };
    });
  }
  function rateTool(catId, toolKey, score) {
    setStack(prev => {
      const cur = prev[catId] || { tools: [], other: "", none: false, nps: {} };
      return { ...prev, [catId]: { ...cur, nps: { ...(cur.nps || {}), [toolKey]: score } } };
    });
  }

  // Preview-tease for gate step
  const gatePreview = useMemo(() => {
    if (step !== GATE_STEP) return null;
    const r = buildReport({ venue, stack });
    return {
      totalGbp: r.totalGbp,
      totalHrs: r.totalHrs,
      gapCount: r.gaps.length,
      gapGbp: r.gapGbp,
      switchGbp: r.switchGbp,
      switchCount: r.switches.length,
    };
  }, [step, venue, stack]);

  const [submitState, setSubmitState] = useState({ status: "idle", error: "" });
  // AI-written review state. Loaded asynchronously after the row is inserted.
  // status: idle | loading | done | error.
  const [aiReview, setAiReview] = useState({ status: "idle", text: "", error: "" });

  async function submitLead() {
    // Honeypot: if filled by a bot, silently advance without sending.
    if (lead.hp) { setStep(REPORT_STEP); return; }
    const r = buildReport({ venue, stack });
    // Flatten per-category NPS into a single { tool_name: score } map for dashboards.
    // Keys prefixed with "__other__:" are stripped of the marker so the vendor name
    // lands in the portal as-is.
    const productNps = {};
    for (const cat of Object.values(stack)) {
      for (const [key, score] of Object.entries((cat && cat.nps) || {})) {
        if (typeof score !== "number") continue;
        const name = key.startsWith("__other__:") ? key.slice("__other__:".length) : key;
        if (name) productNps[name] = score;
      }
    }
    const npsScores = Object.values(productNps);
    const npsAvg = npsScores.length
      ? Math.round(npsScores.reduce((a, b) => a + b, 0) / npsScores.length)
      : null;
    // Generate a client-side UUID so we know the submission id without
    // having to read it back (RLS blocks anon SELECT on submissions). Falls
    // back to a v4-shaped string on browsers that don't expose
    // crypto.randomUUID (≈ <94% but defensive).
    const submissionId = (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function")
      ? crypto.randomUUID()
      : "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
          const r = Math.random() * 16 | 0;
          return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16);
        });
    const payload = {
      id: submissionId,
      venue_type: venue.type,
      sites: venue.sites,
      stack,
      product_nps: productNps,
      nps_avg: npsAvg,
      first_name: lead.firstName,
      last_name: lead.lastName,
      email: lead.email,
      phone_number: lead.phone,
      company: lead.company,
      location: lead.location,
      consent: !!lead.consent,
      score: r.matchScore,
      coverage_pct: r.coverage,
      total_gbp_per_year: r.totalGbp,
      total_hrs_per_week: r.totalHrs,
      gap_count: r.gaps.length,
      gap_categories: r.gaps.map(g => g.category.label),
      segment: r.segment,
    };
    setSubmitState({ status: "submitting", error: "" });
    let submissionInserted = false;
    try {
      if (SUPABASE_ANON_KEY && !SUPABASE_ANON_KEY.startsWith("REPLACE_")) {
        await postSubmission(payload);
        submissionInserted = true;
      } else {
        console.warn("[tech-stack-benchmark] SUPABASE_ANON_KEY not set, skipping network submission");
      }
      setSubmitState({ status: "idle", error: "" });
      setStep(REPORT_STEP);
    } catch (err) {
      setSubmitState({ status: "error", error: err.message || "Submission failed" });
      return;
    }
    // Kick off the AI-written review in the background. The numeric report is
    // already visible — this fills in the narrative section when ready.
    if (submissionInserted) {
      setAiReview({ status: "loading", text: "", error: "" });
      postStackReview(submissionId)
        .then(text => {
          if (text) setAiReview({ status: "done", text, error: "" });
          else setAiReview({ status: "error", text: "", error: "empty review" });
        })
        .catch(err => {
          console.error("[stack-review] fetch failed", err);
          setAiReview({ status: "error", text: "", error: err.message || "review failed" });
        });
    }
  }
  function reset() {
    setStep(0); setVenue({ type: "", sites: "" }); setStack({});
    setLead({ firstName: "", lastName: "", email: "", phone: "", company: "", location: "", consent: false, hp: "" });
    setSubmitState({ status: "idle", error: "" });
    setAiReview({ status: "idle", text: "", error: "" });
    setDeepStep(null);
    setDeepAnswers({ pain_category: "", renewal_window: "", tech_spend_band: "", decision_maker: "", growth_goal: "", growth_goal_other: "", open_to_intro: "" });
    setDeepSubmit({ status: "idle", error: "" });
  }

  async function submitDeepReview() {
    const r = buildReport({ venue, stack });
    const payload = {
      first_name: lead.firstName,
      last_name: lead.lastName,
      email: lead.email,
      phone_number: lead.phone,
      company: lead.company,
      location: lead.location,
      score: r.matchScore,
      total_gbp_per_year: r.totalGbp,
      pain_category: deepAnswers.pain_category || null,
      renewal_window: deepAnswers.renewal_window || null,
      tech_spend_band: deepAnswers.tech_spend_band || null,
      decision_maker: deepAnswers.decision_maker || null,
      growth_goal: deepAnswers.growth_goal || null,
      growth_goal_other: deepAnswers.growth_goal_other || null,
      open_to_intro: deepAnswers.open_to_intro || null,
    };
    setDeepSubmit({ status: "submitting", error: "" });
    try {
      if (SUPABASE_ANON_KEY && !SUPABASE_ANON_KEY.startsWith("REPLACE_")) {
        await postDeepReview(payload, SUPABASE_ANON_KEY, SUPABASE_URL);
      } else {
        console.warn("[tech-stack-benchmark] SUPABASE_ANON_KEY not set, skipping deep review submission");
      }
      setDeepSubmit({ status: "idle", error: "" });
      setDeepStep("thanks");
    } catch (err) {
      setDeepSubmit({ status: "error", error: err.message || "Submission failed" });
    }
  }

  const showProgress = step >= VENUE_STEP && step <= GATE_STEP;

  // Scroll back to top every time the step or deep-review question changes
  // so users don't land halfway down the next screen.
  useEffect(() => {
    try { window.scrollTo({ top: 0, behavior: "instant" }); } catch { window.scrollTo(0, 0); }
    if (window.parent !== window) {
      window.parent.postMessage({ type: "tot-stack-review-scroll-to-top" }, "*");
    }
  }, [step, deepStep]);

  return h("div", { className: "min-h-screen" },
    h("header", { className: "border-b border-line bg-brandDeep/90 backdrop-blur sticky top-0 z-10" },
      h("div", { className: "max-w-5xl mx-auto px-5 py-3 flex items-center justify-between" },
        h("a", {
          href: "https://www.techontoast.community",
          target: "_top",
          className: "flex items-center gap-3 hover:opacity-80 transition",
          "aria-label": "Tech on Toast home",
        },
          h("img", {
            src: "tech-on-toast-logo.svg",
            alt: "Tech on Toast",
            className: "h-10 w-auto logo-invert",
          }),
          h("div", { className: "hidden sm:block h-6 w-px bg-line" }),
          h("div", { className: "hidden sm:block font-display font-semibold text-sm leading-tight" },
            "Stack",
            h("br"),
            "Review"
          ),
        ),
        step !== 0 && h(GhostBtn, { onClick: reset }, "Restart")
      )
    ),

    h("main", { className: "max-w-3xl mx-auto px-4 sm:px-5 py-6 sm:py-10 md:py-14" },
      showProgress && h("div", { className: "mb-8" }, h(Progress, { step: progressStep, total: progressTotal })),

      step === 0 && h(Intro, { onStart: () => setStep(VENUE_STEP) }),

      step === VENUE_STEP && h(VenueStep, {
        value: venue,
        onChange: setVenue,
        onNext: () => { ensureCat(CATEGORIES[0].id); setStep(FIRST_CAT_STEP); },
      }),

      currentCategory && h(CategoryStep, {
        category: currentCategory,
        value: stack[currentCategory.id] || { tools: [], other: "", none: false, nps: {} },
        onToggle: (t) => toggleTool(currentCategory.id, t),
        onNone: () => toggleNone(currentCategory.id),
        onOtherChange: (t) => setOther(currentCategory.id, t),
        onRateTool: (toolKey, score) => rateTool(currentCategory.id, toolKey, score),
        onNext: () => setStep(step + 1),
        onBack: () => setStep(step - 1),
        canBack: step > FIRST_CAT_STEP,
      }),

      step === GATE_STEP && h(GateStep, {
        value: lead,
        onChange: setLead,
        onSubmit: submitLead,
        onBack: () => setStep(step - 1),
        preview: gatePreview,
        submitState: submitState,
      }),

      step === REPORT_STEP && deepStep === null && h(Report, { venue, stack, lead, aiReview, onReset: reset, onStartDeep: () => setDeepStep(0) }),

      step === REPORT_STEP && typeof deepStep === "number" && (() => {
        const q = DEEP_QUESTIONS[deepStep];
        const isLast = deepStep === DEEP_QUESTIONS.length - 1;
        return h("div", null,
          deepSubmit.status === "error" && h("div", {
            className: "max-w-2xl mx-auto mb-4 rounded-xl bg-red-950/60 border border-red-800 text-red-200 text-sm p-3",
          }, "Sorry, couldn't save that. ", deepSubmit.error || "Please try again."),
          h(DeepQuestion, {
            q,
            answer: deepAnswers[q.id],
            otherValue: q.id === "growth_goal" ? deepAnswers.growth_goal_other : undefined,
            onAnswer: (v) => setDeepAnswers(a => ({ ...a, [q.id]: v })),
            onOtherChange: (v) => setDeepAnswers(a => ({ ...a, growth_goal_other: v })),
            step: deepStep + 1,
            total: DEEP_QUESTIONS.length,
            onBack: () => setDeepStep(deepStep - 1),
            canBack: deepStep > 0,
            onNext: () => {
              if (isLast) submitDeepReview();
              else setDeepStep(deepStep + 1);
            },
          })
        );
      })(),

      step === REPORT_STEP && deepStep === "thanks" && h(DeepThanks, { onReset: reset, lead }),
    ),

    h("footer", { className: "max-w-5xl mx-auto px-5 py-10 text-center text-xs text-muted space-y-1" },
      h("div", null,
        "Built by ",
        h("a", { href: "https://www.techontoast.community", target: "_blank", rel: "noopener", className: "underline hover:text-brand" }, "Tech on Toast"),
        ", the UK hospitality tech community."
      ),
      h("div", null, "We speak operator, not code.")
    )
  );
}

// ---------- IFRAME AUTO-RESIZE ----------
// When embedded in an <iframe> (e.g. on techontoast.community), post the document
// height up to the parent page so it can resize the iframe to match. The parent
// listens for { type: "tot-stack-review-height", height } messages.
(() => {
  if (window.parent === window) return; // not embedded
  let lastHeight = 0;
  const send = () => {
    const h = Math.max(
      document.documentElement.scrollHeight,
      document.body.scrollHeight
    );
    if (h === lastHeight) return;
    lastHeight = h;
    window.parent.postMessage({ type: "tot-stack-review-height", height: h }, "*");
  };
  send();
  window.addEventListener("resize", send);
  new ResizeObserver(send).observe(document.body);
  new MutationObserver(send).observe(document.body, { childList: true, subtree: true, characterData: true });
})();
</script>
