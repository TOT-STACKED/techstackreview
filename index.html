// ---------- ROI MODEL ----------
// Per-site annual savings & weekly hours saved when an operator adopts a tool in this category.
// Numbers are directional industry benchmarks for a typical UK site doing ~£800k–£1.2m revenue.
const ROI = {
  pos:       { hrs: 2, gbp: 1500,  why: "Modern EPOS integrations kill 1–3 hrs/wk of manual reconciliation and data re-entry." },
  payments:  { hrs: 2, gbp: 4800,  why: "Modern acquirers typically cut card fees 0.3–0.5% (~£3–5k/site/yr on £1m revenue). TRONC saves ~13.8% NI on distributed tips." },
  workforce: { hrs: 8, gbp: 14000, why: "Smart rotas trim 3–5% off wage cost. Payroll in hours not days. Less admin, more floor time." },
  inventory: { hrs: 6, gbp: 18500, why: "2–4 point GP improvement from recipe costing + variance alerts. Weekly stocktake drops from a day to an hour." },
  loyalty:   { hrs: 2, gbp: 9200,  why: "Known guests visit 10–15% more than anonymous ones. Email/SMS to a real database beats paid ads for ROI." },
  learning:  { hrs: 2, gbp: 3600,  why: "Structured onboarding cuts time-to-competency by 30–50%. Tracked compliance = no mystery gaps at audit time." },
};

function siteMultiplier(sites) {
  return { "1": 1, "2-5": 3, "6-20": 10, "20+": 25 }[sites] || 1;
}
function fmtGBP(n) {
  if (n >= 1000000) return "£" + (n / 1000000).toFixed(1) + "m";
  if (n >= 1000) return "£" + Math.round(n / 100) / 10 + "k";
  return "£" + Math.round(n);
}

// ---------- REPORT ----------
function buildReport({ venue, stack }) {
  const segment = segmentFor(venue.type, venue.sites);
  const bench = BENCHMARKS[segment];
  const mult = siteMultiplier(venue.sites);

  const covered = CATEGORIES.filter(c => {
    const s = stack[c.id] || {};
    return (s.tools || []).length > 0 || (s.other && s.other.trim());
  });
  const coverage = Math.round((covered.length / CATEGORIES.length) * 100);

  // Gaps: categories with no tool. Full ROI available if they close the gap.
  const gaps = CATEGORIES
    .filter(c => {
      const s = stack[c.id] || {};
      return (s.tools || []).length === 0 && !(s.other && s.other.trim());
    })
    .map(c => {
      const peerPct = bench.adoption[c.id] || 0;
      const roi = ROI[c.id] || { hrs: 0, gbp: 0, why: "" };
      return {
        kind: "gap",
        category: c,
        peerPct,
        hrsPerWeek: roi.hrs * mult,
        gbpPerYear: roi.gbp * mult,
        why: roi.why,
      };
    })
    .filter(g => g.peerPct >= 35)
    .sort((a, b) => b.gbpPerYear - a.gbpPerYear);

  // Switches: categories where they DO have a tool. A portion of ROI is still recoverable
  // via renegotiating contracts, consolidating duplicates, or switching to a modern vendor.
  const SWITCH_FACTOR = 0.25; // capture ~25% of full category ROI via switch/renegotiate
  const switches = CATEGORIES
    .filter(c => {
      const s = stack[c.id] || {};
      return (s.tools || []).length > 0 || (s.other && s.other.trim());
    })
    .map(c => {
      const s = stack[c.id] || {};
      const tools = [...(s.tools || []), ...(s.other ? [s.other.trim()] : [])];
      const roi = ROI[c.id] || { hrs: 0, gbp: 0, why: "" };
      return {
        kind: "switch",
        category: c,
        tools,
        hrsPerWeek: Math.round(roi.hrs * SWITCH_FACTOR) * mult,
        gbpPerYear: Math.round(roi.gbp * SWITCH_FACTOR) * mult,
        why: c.id === "payments"
          ? "Card-fee benchmarking alone typically finds 0.1–0.3% savings on acquirer renegotiation."
          : c.id === "pos"
          ? "Most operators overpay on legacy POS contracts. A switch or renegotiation cycle trims 15–25%."
          : c.id === "people"
          ? "Modern rota optimisers consistently shave 1–2% off wage bill vs. older tools."
          : c.id === "stock"
          ? "Auditing whether your stock tool is actually surfacing variance often uncovers 1–2 points of GP."
          : "Benchmarking contract terms, consolidating overlap, or switching to best-in-class typically unlocks 20–30% of the category ROI.",
      };
    })
    .filter(s => s.gbpPerYear > 0)
    .sort((a, b) => b.gbpPerYear - a.gbpPerYear);

  const gapGbp = gaps.reduce((t, g) => t + g.gbpPerYear, 0);
  const gapHrs = gaps.reduce((t, g) => t + g.hrsPerWeek, 0);
  const switchGbp = switches.reduce((t, s) => t + s.gbpPerYear, 0);
  const switchHrs = switches.reduce((t, s) => t + s.hrsPerWeek, 0);
  const totalGbp = gapGbp + switchGbp;
  const totalHrs = gapHrs + switchHrs;

  const matchScore = Math.min(100, Math.round(coverage * 0.7 + (100 - gaps.length * 12) * 0.3));

  return { segment, bench, coverage, gaps, switches, matchScore, covered, totalGbp, totalHrs, gapGbp, gapHrs, switchGbp, switchHrs };
}

function ScoreRing({ score }) {
  const r = 54, c = 2 * Math.PI * r;
  const pct = Math.max(0, Math.min(100, score));
  const off = c - (pct / 100) * c;
  return h("div", { className: "relative w-32 h-32" },
    h("svg", { viewBox: "0 0 120 120", className: "w-full h-full -rotate-90" },
      h("circle", { cx: 60, cy: 60, r, stroke: "#254211", strokeWidth: 10, fill: "none" }),
      h("circle", {
        cx: 60, cy: 60, r, stroke: "#82e914", strokeWidth: 10, fill: "none",
        strokeLinecap: "round",
        strokeDasharray: c, strokeDashoffset: off,
        style: { transition: "stroke-dashoffset 900ms ease-out" },
      })
    ),
    h("div", { className: "absolute inset-0 flex flex-col items-center justify-center" },
      h("div", { className: "font-display text-3xl font-bold" }, score),
      h("div", { className: "text-xs text-muted" }, "/ 100")
    )
  );
}

            `Your stack covers ${coverage}% of the 6 core categories. `,

    gaps.length > 0 && h("div", { className: "mb-8" },
      h("div", { className: "flex items-end justify-between mb-3" },
        h("div", null,
          h("div", { className: "text-xs uppercase tracking-wider text-toast font-semibold mb-1" }, "Gap opportunities"),
          h("h3", { className: "font-display text-xl font-bold" }, `Close these ${gaps.length} gap${gaps.length === 1 ? "" : "s"} that peers already have`)
        ),
        h("div", { className: "text-xs text-muted" }, "ranked by £ upside")
      ),
      h("div", { className: "grid gap-3" },
        gaps.slice(0, 5).map((g, i) => h("div", {
          key: g.category.id,
          className: "rounded-2xl bg-canvas border border-line p-5 flex flex-col md:flex-row md:items-start gap-4",
        },
          h("div", { className: "flex items-center gap-3 md:w-52 shrink-0" },
            h("div", { className: "w-9 h-9 rounded-full bg-toast/15 text-toast flex items-center justify-center font-bold text-sm" }, `#${i + 1}`),
            h("div", null,
              h("div", { className: "text-xs text-muted" }, g.category.icon + " " + g.category.label),
              h("div", { className: "font-semibold" }, `${g.peerPct}% of peers have this`)
            )
          ),
          h("div", { className: "flex-1" },
            h("div", { className: "flex flex-wrap gap-x-5 gap-y-1 mb-2" },
              h("div", null,
                h("div", { className: "text-xs text-muted" }, "Potential £ saved / yr"),
                h("div", { className: "font-display font-bold text-mint text-lg" }, fmtGBP(g.gbpPerYear))
              ),
              h("div", null,
                h("div", { className: "text-xs text-muted" }, "Hrs saved / wk"),
                h("div", { className: "font-display font-bold text-lg" }, `+${g.hrsPerWeek}`)
              ),
            ),
            h("div", { className: "text-sm text-muted" }, g.why)
          )
        ))
      ),
    ),

    // Switch / renegotiation opportunities: where they DO have a tool but there's upside in changing
    switches.length > 0 && h("div", { className: "mb-8" },
      h("div", { className: "flex items-end justify-between mb-3" },
        h("div", null,
          h("div", { className: "text-xs uppercase tracking-wider text-mint font-semibold mb-1" }, "Switch & renegotiate"),
          h("h3", { className: "font-display text-xl font-bold" }, `Recoverable from what you already run`)
        ),
        h("div", { className: "text-xs text-muted" }, `~${fmtGBP(switchGbp)} total`)
      ),
      h("div", { className: "grid gap-3" },
        switches.slice(0, 5).map((s, i) => h("div", {
          key: s.category.id,
          className: "rounded-2xl bg-canvas border border-line p-5 flex flex-col md:flex-row md:items-start gap-4",
        },
          h("div", { className: "flex items-center gap-3 md:w-52 shrink-0" },
            h("div", { className: "w-9 h-9 rounded-full bg-mint/15 text-mint flex items-center justify-center font-bold text-sm" }, `#${i + 1}`),
            h("div", null,
              h("div", { className: "text-xs text-muted" }, s.category.icon + " " + s.category.label),
              h("div", { className: "font-semibold text-sm" }, `You run: ${s.tools.slice(0, 2).join(", ")}${s.tools.length > 2 ? "…" : ""}`)
            )
          ),
          h("div", { className: "flex-1" },
            h("div", { className: "flex flex-wrap gap-x-5 gap-y-1 mb-2" },
              h("div", null,
                h("div", { className: "text-xs text-muted" }, "Recoverable / yr"),
                h("div", { className: "font-display font-bold text-mint text-lg" }, fmtGBP(s.gbpPerYear))
              ),
              h("div", null,
                h("div", { className: "text-xs text-muted" }, "Hrs / wk"),
                h("div", { className: "font-display font-bold text-lg" }, `+${s.hrsPerWeek}`)
              ),
            ),
            h("div", { className: "text-sm text-muted" }, s.why)
          )
        ))
      ),
    ),

    // Category breakdown
    h("h3", { className: "font-display text-xl font-bold mb-3" }, "Category-by-category"),
    h("div", { className: "grid gap-3 mb-8" },
      CATEGORIES.map(c => {
        const s = stack[c.id] || {};
        const tools = s.tools || [];
        const other = (s.other || "").trim();
        const peerPct = bench.adoption[c.id] || 0;
        const topPeer = (bench.topTools[c.id] || []).slice(0, 3);
        const hasTool = tools.length > 0 || !!other;
        const youList = [...tools, ...(other ? [other] : [])];
        return h("div", {
          key: c.id,
          className: "rounded-2xl bg-canvas border border-line p-5",
        },
          h("div", { className: "flex items-start justify-between gap-4 mb-3" },
            h("div", null,
              h("div", { className: "flex items-center gap-2" },
                h("span", { className: "text-xl" }, c.icon),
                h("div", { className: "font-semibold" }, c.label),
              ),
              h("div", { className: "text-sm text-muted mt-1" },
                hasTool
                  ? `You use: ${youList.join(", ")}`
                  : "You haven't got a tool here."
              )
            ),
            h("div", { className: "text-right" },
              h("div", { className: "text-xs text-muted" }, "Peer adoption"),
              h("div", { className: `font-display text-xl font-bold ${peerPct >= 70 ? "text-toast" : ""}` }, `${peerPct}%`)
            )
          ),
          h("div", { className: "h-1.5 bg-line rounded-full overflow-hidden mb-3" },
            h("div", { className: "h-full bg-toast bar-fill", style: { width: `${peerPct}%` } })
          ),
          topPeer.length > 0 && h("div", { className: "flex flex-wrap gap-2" },
            topPeer.map(([name, pct]) => {
              const isYours = tools.includes(name);
              return h("span", {
                key: name,
                className: `text-xs px-2.5 py-1 rounded-full border
                  ${isYours
                    ? "bg-brand text-ink border-brand"
                    : "bg-brandShade text-cream/70 border-line"}`,
              }, `${name} · ${pct}%${isYours ? " · you" : ""}`);
            })
          )
        );
      })
    ),

    // CTA
    h("div", { className: "rounded-2xl bg-canvas border border-line p-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4" },
      h("div", null,
        h("div", { className: "font-display text-lg font-bold" }, "Want help closing these gaps?"),
        h("div", { className: "text-sm text-muted" }, "We'll intro you to 2–3 vetted Tech on Toast partners for your priority gaps. No sales spam, just the right shortlist.")
      ),
      h("div", { className: "flex gap-2" },
        h("button", {
          className: "px-4 py-2.5 rounded-full border border-line text-sm font-medium hover:border-ink",
          onClick: onReset,
        }, "Start over"),
        h("a", {
          href: `mailto:hello@techontoast.community?subject=My%20Stack%20Benchmark%20Follow-up&body=Hi%20team%20%E2%80%94%20I'd%20love%20an%20intro%20on%20my%20top%20gaps%20from%20the%20benchmark.`,
          className: "px-5 py-2.5 rounded-full bg-brand text-ink text-sm font-semibold hover:bg-brandDark",
        }, "Book a call →"),
      )
    ),

    h("div", { className: "text-center text-xs text-muted mt-8" },
      "Benchmarks based on Tech on Toast community data. ROI estimates are directional, not a vendor endorsement or guarantee."
    )

}

// ---------- APP ----------
function App() {
  const [step, setStep] = useState(0);
  const [venue, setVenue] = useState({ type: "", sites: "" });
  const [stack, setStack] = useState({}); // { [catId]: { tools: [], other: "", none: bool } }
  const [lead, setLead] = useState({ firstName: "", email: "", company: "", consent: false, hp: "" });

  const totalCategorySteps = CATEGORIES.length;
  const VENUE_STEP = 1;
  const FIRST_CAT_STEP = 2;
  const LAST_CAT_STEP = FIRST_CAT_STEP + totalCategorySteps - 1;
  const GATE_STEP = LAST_CAT_STEP + 1;
  const REPORT_STEP = GATE_STEP + 1;

  const progressTotal = 1 + totalCategorySteps + 1;
  const progressStep = step === 0 ? 0
    : step === VENUE_STEP ? 1
    : step >= FIRST_CAT_STEP && step <= LAST_CAT_STEP ? 1 + (step - FIRST_CAT_STEP + 1)
    : step === GATE_STEP ? progressTotal
    : progressTotal;

  const currentCategory = step >= FIRST_CAT_STEP && step <= LAST_CAT_STEP
    ? CATEGORIES[step - FIRST_CAT_STEP] : null;

  function ensureCat(catId) {
    setStack(prev => prev[catId] ? prev : { ...prev, [catId]: { tools: [], other: "", none: false } });
  }
  function toggleTool(catId, tool) {
    setStack(prev => {
      const cur = prev[catId] || { tools: [], other: "", none: false };
      const exists = cur.tools.includes(tool);
      return {
        ...prev,
        [catId]: {
          ...cur,
          none: false,
          tools: exists ? cur.tools.filter(t => t !== tool) : [...cur.tools, tool],
        },
      };
    });
  }
  function toggleNone(catId) {
    setStack(prev => {
      const cur = prev[catId] || { tools: [], other: "", none: false };
      const turningOn = !cur.none;
      return { ...prev, [catId]: { tools: turningOn ? [] : cur.tools, other: turningOn ? "" : cur.other, none: turningOn } };
    });
  }
  function setOther(catId, text) {
    setStack(prev => {
      const cur = prev[catId] || { tools: [], other: "", none: false };
      return { ...prev, [catId]: { ...cur, other: text, none: text ? false : cur.none } };
    });
  }

  // Preview-tease for gate step
  const gatePreview = useMemo(() => {
    if (step !== GATE_STEP) return null;
    const r = buildReport({ venue, stack });
    return {
      totalGbp: r.totalGbp,
      totalHrs: r.totalHrs,
      gapCount: r.gaps.length,
      gapGbp: r.gapGbp,
      switchGbp: r.switchGbp,
      switchCount: r.switches.length,
    };
  }, [step, venue, stack]);

  const [submitState, setSubmitState] = useState({ status: "idle", error: "" });

  async function submitLead() {
    // Honeypot: if filled by a bot, silently advance without sending.
    if (lead.hp) { setStep(REPORT_STEP); return; }
    const r = buildReport({ venue, stack });
    const payload = {
      venue_type: venue.type,
      sites: venue.sites,
      stack,
      first_name: lead.firstName,
      email: lead.email,
      company: lead.company,
      consent: !!lead.consent,
      score: r.matchScore,
      coverage_pct: r.coverage,
      total_gbp_per_year: r.totalGbp,
      total_hrs_per_week: r.totalHrs,
      gap_count: r.gaps.length,
      gap_categories: r.gaps.map(g => g.category.label),
      segment: r.segment,
    };
    setSubmitState({ status: "submitting", error: "" });
    try {
      if (SUPABASE_ANON_KEY && !SUPABASE_ANON_KEY.startsWith("REPLACE_")) {
        await postSubmission(payload);
      } else {
        console.warn("[tech-stack-benchmark] SUPABASE_ANON_KEY not set, skipping network submission");
      }
      setSubmitState({ status: "idle", error: "" });
      setStep(REPORT_STEP);
    } catch (err) {
      setSubmitState({ status: "error", error: err.message || "Submission failed" });
    }
  }
  function reset() {
    setStep(0); setVenue({ type: "", sites: "" }); setStack({});
    setLead({ firstName: "", email: "", company: "", consent: false, hp: "" });
    setSubmitState({ status: "idle", error: "" });
  }

  const showProgress = step >= VENUE_STEP && step <= GATE_STEP;

  return h("div", { className: "min-h-screen" },
    h("header", { className: "border-b border-line bg-brandDeep/90 backdrop-blur sticky top-0 z-10" },
      h("div", { className: "max-w-5xl mx-auto px-5 py-3 flex items-center justify-between" },
        h("div", { className: "flex items-center gap-3" },
          h("img", {
            src: "tech-on-toast-logo.svg",
            alt: "Tech on Toast",
            className: "h-10 w-auto logo-invert",
          }),
          h("div", { className: "hidden sm:block h-6 w-px bg-line" }),
          h("div", { className: "hidden sm:block font-display font-semibold text-sm leading-tight" },
            "Stack",
            h("br"),
            "Review"
          ),
        ),
        step !== 0 && h(GhostBtn, { onClick: reset }, "Restart")
      )
    ),

    h("main", { className: "max-w-3xl mx-auto px-5 py-10 md:py-14" },
      showProgress && h("div", { className: "mb-8" }, h(Progress, { step: progressStep, total: progressTotal })),

      step === 0 && h(Intro, { onStart: () => setStep(VENUE_STEP) }),

      step === VENUE_STEP && h(VenueStep, {
        value: venue,
        onChange: setVenue,
        onNext: () => { ensureCat(CATEGORIES[0].id); setStep(FIRST_CAT_STEP); },
      }),

      currentCategory && h(CategoryStep, {
        category: currentCategory,
        value: stack[currentCategory.id] || { tools: [], other: "", none: false },
        onToggle: (t) => toggleTool(currentCategory.id, t),
        onNone: () => toggleNone(currentCategory.id),
        onOtherChange: (t) => setOther(currentCategory.id, t),
        onNext: () => setStep(step + 1),
        onBack: () => setStep(step - 1),
        canBack: step > FIRST_CAT_STEP,
      }),

      step === GATE_STEP && h(GateStep, {
        value: lead,
        onChange: setLead,
        onSubmit: submitLead,
        onBack: () => setStep(step - 1),
        preview: gatePreview,
        submitState: submitState,
      }),

      step === REPORT_STEP && h(Report, { venue, stack, lead, onReset: reset }),
    ),

    h("footer", { className: "max-w-5xl mx-auto px-5 py-10 text-center text-xs text-muted space-y-1" },
      h("div", null,
        "Built by ",
        h("a", { href: "https://www.techontoast.community", target: "_blank", rel: "noopener", className: "underline hover:text-ink" }, "Tech on Toast"),
        ", the UK hospitality tech community."
      ),
      h("div", null, "We speak operator, not code.")
    )
  );
}

createRoot(document.getElementById("root")).render(h(App));
</script>
